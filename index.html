  html{ -webkit-text-size-adjust:100%; }

  body{
    font-family:var(--sans);
    background:
      radial-gradient(120% 90% at 50% -10%, #141a20 0%, transparent 60%),
      radial-gradient(90% 70% at 50% 110%, #10141a 0%, transparent 55%),
      var(--bg);
    color:var(--ink);
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:
      max(28px, env(safe-area-inset-top))
      20px
      max(40px, env(safe-area-inset-bottom));
    line-height:1.5;
  }

  .page{ width:100%; max-width:440px; }

  /* ---------- header ---------- */
  header{ text-align:center; padding:16px 0 28px; }

  .logo{
    display:block;
    width:min(240px, 64%);
    margin:0 auto 20px;
    opacity:.92;
  }

  h1{
    font-size:clamp(24px, 6.4vw, 30px);
    font-weight:700;
    letter-spacing:-0.015em;
    line-height:1.2;
    padding:0 6px;
  }

  .tagline{
    color:var(--ink-dim);
    font-size:15px;
    margin-top:10px;
    padding:0 12px;
  }

  /* ---------- player ---------- */
  .player{
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    background:var(--bg-sunk);
    margin-bottom:26px;
  }
  .player iframe{ display:block; width:100%; height:166px; border:0; }
  .player.hidden{ display:none; }

  /* ---------- gate ---------- */
  .card{
    background:var(--bg-raise);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:22px 18px 20px;
  }

  .card-title{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.34em;
    text-transform:uppercase;
    color:var(--ink-dim);
    text-align:center;
    margin-bottom:18px;
  }

  /* signal-chain progress: three nodes, line fills as steps complete */
  .chain{
    display:flex; align-items:center; justify-content:center;
    gap:0; margin:0 auto 22px; width:70%;
  }
  .node{
    width:12px; height:12px; border-radius:50%;
    border:2px solid var(--ink-faint);
    background:transparent;
    flex:none;
    transition:all .35s ease;
  }
  .node.done{
    border-color:var(--accent);
    background:var(--accent);
    box-shadow:0 0 12px 0 color-mix(in srgb, var(--accent) 55%, transparent);
  }
  .wire{
    height:2px; flex:1; background:var(--line);
    transition:background .35s ease;
  }
  .wire.done{ background:var(--accent); }

  .chain-count{
    text-align:center;
    font-size:12px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--ink-faint);
    margin:-12px 0 18px;
  }
  .chain-count b{ color:var(--accent); font-weight:600; }

  .steps{ display:flex; flex-direction:column; gap:12px; }

  .step-btn{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
    width:100%;
    min-height:58px;
    padding:14px 18px;
    font-family:var(--sans);
    font-size:16px;
    font-weight:600;
    color:var(--ink);
    background:var(--bg-sunk);
    border:1px solid var(--line);
    border-radius:12px;
    cursor:pointer;
    text-align:left;
    transition:border-color .25s ease, background .25s ease, color .25s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .step-btn:active{ transform:scale(.99); }
  .step-btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .step-btn .glyph{
    flex:none;
    width:24px;
    text-align:center;
    font-size:18px;
    color:var(--accent);
  }
  .step-btn .lbl{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .step-btn .lbl small{
    font-weight:400;
    font-size:12px;
    line-height:1.35;
    color:var(--ink-faint);
  }
  .step-btn.done .lbl small{ color:var(--ink-faint); }

  .step-btn .mark{
    font-family:var(--mono);
    font-size:13px;
    color:var(--ink-faint);
    flex:none;
    transition:color .25s ease;
  }

  .step-btn.done{
    border-color:color-mix(in srgb, var(--accent) 55%, var(--line));
    background:color-mix(in srgb, var(--accent) 9%, var(--bg-sunk));
    color:var(--ink-dim);
  }
  .step-btn.done .mark{ color:var(--accent); }

  /* ---------- download section ---------- */
  .unlock{
    margin-top:26px;
    text-align:center;
    transition:opacity .4s ease;
  }

  .unlock.locked{ opacity:.38; pointer-events:none; user-select:none; }

  .unlock-state{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.34em;
    text-transform:uppercase;
    color:var(--ink-faint);
    margin-bottom:16px;
  }
  .unlock.open .unlock-state{ color:var(--accent); }

  .btn{
    display:flex; align-items:center; justify-content:center;
    width:100%;
    min-height:60px;
    padding:16px 20px;
    border-radius:12px;
    font-size:17px;
    font-weight:700;
    text-decoration:none;
    cursor:pointer;
    border:1px solid transparent;
    transition:filter .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .btn:active{ transform:scale(.99); }

  .btn-primary{
    background:var(--accent);
    color:#0b0e10;
    margin-bottom:12px;
  }
  .btn-primary:hover{ filter:brightness(1.08); }

  .btn-secondary{
    background:transparent;
    color:var(--ink-dim);
    border-color:var(--line);
    font-weight:600;
    font-size:15px;
    min-height:52px;
  }
  .btn-secondary:hover{ color:var(--ink); border-color:var(--ink-faint); }

  .thanks{
    margin-top:18px;
    color:var(--ink-dim);
    font-size:14px;
  }

  .socials{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-top:14px;
  }
  .social{
    display:flex;
    align-items:center;
    justify-content:center;
    width:48px;
    height:48px;
    border-radius:12px;
    border:1px solid var(--line);
    color:var(--ink-dim);
    text-decoration:none;
    transition:color .2s ease, border-color .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .social:hover, .social:active{
    color:var(--accent);
    border-color:color-mix(in srgb, var(--accent) 55%, var(--line));
  }
  .social:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  footer{
    margin-top:38px;
    text-align:center;
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--ink-faint);
  }

  @keyframes unlock-pop{
    0%{ transform:scale(.97); }
    60%{ transform:scale(1.015); }
    100%{ transform:scale(1); }
  }
  .unlock.open .btn-primary{ animation:unlock-pop .5s ease; }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>

        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <rect x="2.5" y="2.5" width="19" height="19" rx="5.5"/>
          <circle cx="12" cy="12" r="4.6"/>
          <circle cx="17.6" cy="6.4" r="1.3" fill="currentColor" stroke="none"/>
        </svg>
      </a>
    </div>
  </section>

  <footer>tmrwsmdy</footer>

</div>

<script>
/* ==================================================================
   CONFIG — THE ONLY THING YOU EDIT PER RELEASE.
   Change the values, save the file, re-upload. That's it.
   ================================================================== */
const CONFIG = {

  // The release name shown big in the header
  trackTitle: "Don't Give Up (Maxos Edit)",

  // The friendly line under the title
  headerTagline: "Free download — show the track some love first.",

  // SoundCloud link to THE TRACK (used for the player embed, the Like button, and the Repost button)
  soundcloudTrackURL: "https://soundcloud.com/tmrwsmdy/dont-give-up-maxos-edit",

  // SoundCloud link to the TM PROFILE (used for the Follow button)
  soundcloudProfileURL: "https://soundcloud.com/tmrwsmdy",

  // Bandcamp link to the free download page (Bandcamp handles the email + file)
  bandcampDownloadURL: "https://tmrwsmdy.bandcamp.com/album/chicane-bryan-adams-dont-give-up-maxos-tomorrows-monday-edit",

  // Bandcamp "follow us" link (secondary button after unlock)
  bandcampFollowURL: "https://tmrwsmdy.bandcamp.com/?external_follow=1",

  // Instagram profile link — shown as an optional button AFTER unlock (leave "" to hide it)
  instagramURL: "https://www.instagram.com/tmrwsmdy",

  // Small friendly line under the download buttons
  thankYouLine: "Thanks for the support 🖤",

  // Theme accent colour (any hex code) — highlights, progress dots, download button
  accentColor: "#c8a24a"

};
/* ================== END OF CONFIG — DON'T EDIT BELOW ================== */


(function () {

  /* ---- apply CONFIG to the page ---- */
  document.documentElement.style.setProperty('--accent', CONFIG.accentColor);
  document.getElementById('track-title').textContent = CONFIG.trackTitle;
  document.getElementById('tagline').textContent = CONFIG.headerTagline;
  document.getElementById('thanks').textContent = CONFIG.thankYouLine;
  document.getElementById('dl-btn').href = CONFIG.bandcampDownloadURL;
  document.getElementById('bc-follow-btn').href = CONFIG.bandcampFollowURL;
  if (CONFIG.instagramURL && CONFIG.instagramURL.trim() !== "") {
    const ig = document.getElementById('ig-btn');
    ig.href = CONFIG.instagramURL.trim();
    ig.hidden = false;
  }
  document.title = "TM Records — " + CONFIG.trackTitle;

  /* ---- SoundCloud embed (hidden if no track URL) ---- */
  const playerBox = document.getElementById('player');
  if (CONFIG.soundcloudTrackURL && CONFIG.soundcloudTrackURL.trim() !== "") {
    const iframe = document.createElement('iframe');
    iframe.allow = "autoplay";
    iframe.loading = "lazy";
    iframe.title = "SoundCloud player";
    iframe.src = "https://w.soundcloud.com/player/?url="
      + encodeURIComponent(CONFIG.soundcloudTrackURL.trim())
      + "&color=" + CONFIG.accentColor.replace('#', '')
      + "&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&visual=false";
    playerBox.appendChild(iframe);
    playerBox.classList.remove('hidden');
  } else {
    console.warn("TM gate: CONFIG.soundcloudTrackURL is empty — player hidden, Like/Repost buttons will mark done without opening SoundCloud.");
  }

  /* ---- gate state (per release, per session) ---- */
  const STORE_KEY = "tm-gate::" + CONFIG.bandcampDownloadURL;   // new release URL = fresh state
  const steps = [
    { id: "step-follow", key: "follow", url: CONFIG.soundcloudProfileURL },
    { id: "step-like",   key: "like",   url: CONFIG.soundcloudTrackURL },
    { id: "step-repost", key: "repost", url: CONFIG.soundcloudTrackURL }
  ];

  let state = { follow: false, like: false, repost: false };
  const prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // restore state if the visitor left and came back within the same session
  try {
    const saved = sessionStorage.getItem(STORE_KEY);
    if (saved) state = Object.assign(state, JSON.parse(saved));
  } catch (e) { /* storage unavailable (some in-app browsers) — in-memory only */ }

  function save() {
    try { sessionStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  function render() {
    let doneCount = 0;
    steps.forEach(function (s, i) {
      const btn = document.getElementById(s.id);
      const done = state[s.key];
      btn.classList.toggle('done', done);
      btn.querySelector('.mark').textContent = done ? "✓ done" : "○";
      btn.setAttribute('aria-pressed', done ? "true" : "false");
      document.getElementById('node-' + i).classList.toggle('done', done);
      if (done) doneCount++;
    });
    // wires fill left to right based on how many are done
    document.getElementById('wire-0').classList.toggle('done', doneCount >= 2);
    document.getElementById('wire-1').classList.toggle('done', doneCount >= 3);
    document.getElementById('chain-count').innerHTML = "<b>" + doneCount + "</b> of 3 done";

    const unlocked = doneCount === steps.length;
    const unlock = document.getElementById('unlock');
    const wasLocked = unlock.classList.contains('locked');
    unlock.classList.toggle('locked', !unlocked);
    unlock.classList.toggle('open', unlocked);
    if (unlocked && wasLocked && !prefersReducedMotion) {
      setTimeout(function(){ unlock.scrollIntoView({ behavior:'smooth', block:'center' }); }, 250);
    }
    document.getElementById('unlock-state').textContent = unlocked
      ? "Unlocked"
      : "Locked — complete the 3 steps above";
  }

  steps.forEach(function (s) {
    document.getElementById(s.id).addEventListener('click', function () {
      if (s.url && s.url.trim() !== "") {
        window.open(s.url.trim(), '_blank', 'noopener');
      }
      state[s.key] = true;
      save();
      render();
    });
  });

  render();

})();
</script>
</body>
</html>
